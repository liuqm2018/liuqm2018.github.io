<!DOCTYPE html>

<html lang="zh">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>我的博客</title>

<style>

body {

margin: 0;

font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;

background: linear-gradient(135deg, #f5f7fa, #c3cfe2);

color: #333;

}

/ 顶部导航 /

.nav {

display: flex;

justify-content: space-between;

padding: 20px 40px;

background: rgba(255,255,255,0.6);

backdrop-filter: blur(10px);

position: sticky;

top: 0;

}

.logo {

font-weight: bold;

}

/ 主体 /

.container {

max-width: 800px;

margin: 60px auto;

padding: 20px;

}

h1 {

font-size: 40px;

}

/ 卡片 /

.card {

background: white;

padding: 20px;

margin: 20px 0;

border-radius: 16px;

box-shadow: 0 10px 20px rgba(0,0,0,0.1);

transition: 0.3s;

}

.card:hover {

transform: translateY(-5px);

}

/ 底部 /

footer {

text-align: center;

padding: 40px;

color: #777;

}

</style>

</head>

<body>

<div class="nav">

<div class="logo">🚀 我的博客</div>

<div>首页 · 文章 · 关于</div>

</div>

<div class="container">

<h1>欢迎来到我的博客 👋</h1>

<p>这里记录技术、生活与思考。</p>

<div class="card">

<h2>📖 第一篇文章</h2>

<p>这是我的第一篇博客文章。</p>

</div>

<div class="card">

<h2>📖 第二篇文章</h2>

<p>继续记录学习过程。</p>

</div>

<div class="card">

<h2>📖 第三篇文章</h2>

<p>越来越像一个真正的博客了。</p>

</div>

</div>

<footer>

© 2026 ccw.loc.cc

</footer>

</body>

</html>
